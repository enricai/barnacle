name: Build

on:
  pull_request:
    branches:
      - main
      - preview
      - staging
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          if [ -d "dist" ] && [ -f "dist/server.js" ]; then
            echo "Build successful — dist/server.js exists"
          else
            echo "Build failed — dist/server.js not found"
            exit 1
          fi

      # Load-smoke the production build — catches path-alias resolution
      # bugs and Prisma CJS/ESM regressions that existence-only checks
      # miss. `require()` initializes every top-level module as Node
      # would on a real boot; a missing @/ alias or ESM/CJS interop
      # failure throws here. main() doesn't fire because process.argv[1]
      # is the -e script, not server.js — so no HTTP listen, no workers.
      - name: Smoke-load dist/server.js
        run: node -e "require('./dist/server.js')"
        env:
          NODE_ENV: production

      - name: Add summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Passed" >> $GITHUB_STEP_SUMMARY
